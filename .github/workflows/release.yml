name: Release macOS App

# Triggered automatically when a PR is merged into main.
# Reads the version from menubar-app/package.json.
# If that version has no tag yet → builds, tags, creates GitHub Release, updates Homebrew.
# If the tag already exists → skips silently (idempotent).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      is_new: ${{ steps.check.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: read
        run: |
          VERSION=$(node -p "require('./menubar-app/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.read.outputs.version }}" | grep -q .; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.read.outputs.version }} already exists — skipping release."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.read.outputs.version }} is new — will release."
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: menubar-app/package-lock.json

      - name: Install dependencies
        working-directory: menubar-app
        run: npm ci

      - name: Setup (data + icons)
        working-directory: menubar-app
        run: npm run setup && npm run build:icon

      - name: Build arm64
        working-directory: menubar-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --arm64 --publish never

      - name: Build x64
        working-directory: menubar-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --x64 --publish never

      - name: Create tag
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          name: "LeetCode Tracker v${{ needs.check-version.outputs.version }}"
          body: |
            ## LeetCode Tracker v${{ needs.check-version.outputs.version }}

            macOS menu bar app — track your LeetCode progress, prep for company interviews, and get a daily problem suggestion right from your menu bar.

            ---

            ### Download

            | File | Platform |
            |---|---|
            | `LeetCode Tracker-${{ needs.check-version.outputs.version }}-arm64.dmg` | Apple Silicon (M1 / M2 / M3 / M4) |
            | `LeetCode Tracker-${{ needs.check-version.outputs.version }}-x64.dmg` | Intel Mac |

            ---

            ### Install

            **Option A — Homebrew (recommended, no Gatekeeper warning):**
            ```bash
            brew tap rustamPy/tap
            brew install --cask leetcode-tracker
            ```

            **Option B — Manual:**
            1. Download the `.dmg` for your Mac
            2. Open it and drag **LeetCode Tracker** to `/Applications`
            3. Eject the disk image
            4. Run the quarantine fix once (macOS blocks unsigned apps on first launch):
            ```bash
            find "/Applications/LeetCode Tracker.app" -exec xattr -d com.apple.quarantine {} \; 2>/dev/null; true
            ```
            Or double-click the included `Remove Quarantine.command` file.

            ---

            ### Features
            - Streak counter in the menu bar — updates live
            - Daily problem suggestion (changes at midnight UTC)
            - Company interview prep — pick a company, see top questions
            - Recent accepted submissions
            - Refresh live data from LeetCode
            - Switch LeetCode username from the settings panel
          draft: false
          prerelease: false
          files: |
            menubar-app/dist/LeetCode.Tracker-*-arm64.dmg
            menubar-app/dist/LeetCode.Tracker-*-arm64-mac.zip
            menubar-app/dist/LeetCode.Tracker-*-x64.dmg
            menubar-app/dist/LeetCode.Tracker-*-x64-mac.zip
            menubar-app/assets/Remove Quarantine.command

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN not set — skipping cask update"
            exit 0
          fi

          VER="${{ needs.check-version.outputs.version }}"

          ARM_DMG="menubar-app/dist/LeetCode.Tracker-${VER}-arm64.dmg"
          X64_DMG="menubar-app/dist/LeetCode.Tracker-${VER}-x64.dmg"

          ARM_SHA=$(shasum -a 256 "$ARM_DMG" | awk '{print $1}')
          X64_SHA=""
          [ -f "$X64_DMG" ] && X64_SHA=$(shasum -a 256 "$X64_DMG" | awk '{print $1}')

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/rustamPy/homebrew-tap.git" /tmp/tap
          CASK="/tmp/tap/Casks/leetcode-tracker.rb"

          # Update version
          sed -i '' "s/version \".*\"/version \"${VER}\"/" "$CASK"

          # Update arm64 SHA256
          awk -v sha="$ARM_SHA" '
            /Hardware::CPU.arm\?/ { arm=1 }
            arm && /sha256/ { sub(/:no_check|"[a-f0-9]{64}"/, "\"" sha "\""); arm=0 }
            { print }
          ' "$CASK" > /tmp/cask.tmp && mv /tmp/cask.tmp "$CASK"

          # Update x64 SHA256
          if [ -n "$X64_SHA" ]; then
            awk -v sha="$X64_SHA" '
              /Hardware::CPU.arm\?/ { arm=1 }
              /else/ { arm=0 }
              !arm && /sha256/ { sub(/:no_check|"[a-f0-9]{64}"/, "\"" sha "\"") }
              { print }
            ' "$CASK" > /tmp/cask.tmp && mv /tmp/cask.tmp "$CASK"
          fi

          cd /tmp/tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/leetcode-tracker.rb
          git diff --staged --quiet || git commit -m "chore: bump leetcode-tracker to v${VER}"
          git push

