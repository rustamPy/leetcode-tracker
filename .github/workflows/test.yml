name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_call:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run tests
        run: python -m pytest backend/tests/ -v --html=reports/results.html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: reports/results.html
          retention-days: 30

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npx vitest run --reporter=default --reporter=html
        working-directory: frontend

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/html/
          retention-days: 30

  menubar:
    name: Menubar (jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: menubar-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: menubar-app

      - name: Run tests
        run: mkdir -p reports && npm test -- --json --outputFile=reports/results.json
        working-directory: menubar-app

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: menubar-test-results
          path: menubar-app/reports/results.json
          retention-days: 30
