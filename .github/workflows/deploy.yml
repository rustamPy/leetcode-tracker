name: Deploy to GitHub Pages

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * *"   # refresh LeetCode data daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write          # needed to commit refreshed userData.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false


jobs:
  tests:
    uses: ./.github/workflows/test.yml

  build:
    needs: tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch LeetCode user data
        run: python3 scripts/fetch_user_data.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_GQL_PROXY: ${{ secrets.VITE_GQL_PROXY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment


  preview-build:
    needs: tests
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (preview)
        run: npm run build
        working-directory: frontend
        env:
          VITE_BASE_PATH: /
          VITE_GQL_PROXY: ${{ secrets.VITE_GQL_PROXY }}

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-preview-${{ github.sha }}
          path: frontend/dist
          retention-days: 7
